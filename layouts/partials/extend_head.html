<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(19, 19, 24, 0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: zoom-out;
}
#lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    box-shadow: 0 0 50px rgba(131, 220, 93, 0.1);
    border-radius: 8px;
    object-fit: contain;
}
</style>

<div id="lightbox">
    <img id="lightbox-img" src="" alt="Popup image">
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const images = document.querySelectorAll(".post-content img, .terminal-img-container img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    images.forEach(img => {
        img.addEventListener("click", function() {
            lightboxImg.src = this.src;
            lightbox.style.display = "flex";
        });
    });

    lightbox.addEventListener("click", function() {
        lightbox.style.display = "none";
        lightboxImg.src = "";
    });
});
</script>

{{- $fusejs := resources.Get "js/fuse.basic.min.js" }}
<script defer src="{{ $fusejs.RelPermalink }}"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    let searchInput = document.getElementById("inline-search-input");
    let searchResults = document.getElementById("inline-search-results");
    let fuse;
    
    if(!searchInput) return;

    fetch("{{ "index.json" | relLangURL }}")
        .then(res => res.json())
        .then(data => {
            let options = {
                keys: ["title", "content", "summary", "tags"],
                ignoreLocation: true,
                threshold: 0.3,
                minMatchCharLength: 2
            };
            fuse = new Fuse(data, options);
        })
        .catch(err => console.error("Search index failed to load", err));

    searchInput.addEventListener("input", function() {
        if (!fuse) return;
        let query = this.value;
        if (query.trim().length === 0) {
            searchResults.style.display = "none";
            searchResults.innerHTML = "";
            return;
        }
        
        let results = fuse.search(query);
        if (results.length > 0) {
            let html = "";
            results.slice(0, 8).forEach(res => {
                html += `<li><a href="${res.item.permalink}">${res.item.title}</a></li>`;
            });
            searchResults.innerHTML = html;
            searchResults.style.display = "block";
        } else {
            searchResults.innerHTML = "<li class='no-results'>No results found</li>";
            searchResults.style.display = "block";
        }
    });

    document.addEventListener("click", function(event) {
        if (!searchInput) return;
        if (!searchInput.contains(event.target) && !searchResults.contains(event.target)) {
            searchResults.style.display = "none";
        }
    });
});
</script>
