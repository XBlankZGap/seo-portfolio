{{ define "main" }}
<main class="flex-1 p-8 lg:p-16 animate-on-scroll">
    <h1 class="text-4xl font-bold text-[#e2e2e5] mb-8">{{ .Title }}</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {{ range .Pages }}
        <a href="{{ .Permalink }}" class="bg-[#1a1c1e] p-8 rounded-2xl border border-[#3c494e]/10 hover:border-[#a8e8ff]/30 transition-all group">
            <h2 class="text-2xl font-bold text-[#e2e2e5] mb-2 group-hover:text-[#a8e8ff] transition-colors">{{ .Title }}</h2>
            <p class="text-[#bbc9cf] text-sm font-light">{{ .Description }}</p>
        </a>
        {{ end }}
    </div>
</main>
{{ end }}
